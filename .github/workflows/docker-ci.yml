name: Docker CI

# Pipeline da Task 95 (Integrar nova tecnologia - Docker).
#
# Garante que:
#  1) As imagens Docker do backend (dev + produção) e do frontend buildam
#     sem erro;
#  2) Os arquivos docker-compose.yml e docker-compose.ci.yml são válidos;
#  3) A PoC de ponta a ponta (backend + Mongo containerizados) responde
#     corretamente em /health e /pets (ver scripts/docker-smoke-test.sh).

on:
  push:
    branches:
      - main
      - "tech/**"
  pull_request:
    branches:
      - main

jobs:
  build-images:
    name: Build & validate Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (development target)
        run: docker build --target development -t getapet-backend:dev ./backend

      - name: Build backend image (production target)
        run: docker build --target production -t getapet-backend:prod ./backend

      - name: Build frontend image (production target)
        run: docker build --target production -t getapet-frontend:prod ./frontend

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.ci.yml config

  docker-poc:
    name: Docker PoC (backend + Mongo end-to-end)
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Docker PoC (smoke test)
        run: ./scripts/docker-smoke-test.sh
